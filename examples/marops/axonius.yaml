  - signal_type: g2_review_velocity
    description: "2-star G2 review of Pardot: 'Pardot feels like it was built for a different era. Attribution is broken, reporting requires constant data exports, and the Salesforce sync is unreliable. Our MOPs team is spending 40% of their time on workarounds. Replacing it.'"
