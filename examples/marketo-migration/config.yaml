# SignalForce configuration — Marketo/HubSpot migration ICP
# Use case: find mid-market B2B SaaS teams hitting the limits of their legacy MAP
# and signaling readiness to migrate to a warehouse-native alternative.
#
# This config demonstrates SignalForce's configurable architecture:
# same engine, different ICP — swap the YAML, get a completely different prospect list.
#
# Copy to config/ to activate: cp -r examples/marketo-migration/ config/

company:
  name: "Conversion"
  product: "AI-native lifecycle campaign orchestration — warehouse-native, Salesforce-native"
  category: "Marketing automation platform"
  website: "https://conversion.com"

icp:
  tiers:
    - name: "Warehouse-Ready B2B SaaS — Active Migration Signal"
      description: >
        Mid-market B2B SaaS (50–500 employees, Series A–C) already running Snowflake,
        BigQuery, or Databricks alongside Salesforce, AND showing signs of MAP friction:
        hiring MOPs engineers, using reverse ETL middleware (Hightouch, Census), or
        building custom data pipelines around their current MAP. This is the 72-hour
        window — they've invested in the warehouse but haven't migrated the MAP yet.
      signals:
        - "marketing operations"
        - "reverse ETL"
        - "Hightouch"
        - "Census"
        - "warehouse-native"
        - "Snowflake + Salesforce"
        - "dbt marketing"

    - name: "HubSpot Enterprise Ceiling Hitters"
      description: >
        B2B SaaS teams on HubSpot Enterprise (30–300 employees, post-Series A) showing
        scaling pain: hiring data engineers for marketing, building custom SQL audiences,
        adding BI tooling on top of HubSpot exports. The tell is a marketing team that
        now has a "Marketing Data" or "Marketing Analytics" engineer — the ceiling is real
        and someone internal is papering over it.
      signals:
        - "HubSpot Enterprise"
        - "marketing analytics engineer"
        - "marketing data engineer"
        - "CRM analytics"
        - "Looker marketing"
        - "marketing SQL"

    - name: "Pardot / Eloqua Enterprise Migration"
      description: >
        Larger B2B companies (200–2000 employees) on Pardot or Eloqua evaluating
        replacements. Slower sales cycle but larger ACV. Signal is hiring a "Marketing
        Technology Architect" or "Martech Modernization" initiative showing up in
        job postings or LinkedIn content.
      signals:
        - "Pardot migration"
        - "Eloqua replacement"
        - "marketing technology architect"
        - "martech modernization"
        - "MAP consolidation"
        - "Salesforce Marketing Cloud"

    - name: "Data-First Startups — Pre-MAP"
      description: >
        Series A B2B SaaS teams (20–100 employees) that have already built on Snowflake
        or BigQuery but haven't yet chosen a MAP — they're running lifecycle on HubSpot
        free or Mailchimp with a warehouse behind it. These teams will choose a MAP in
        the next 6–12 months; getting in early wins the category decision.
      signals:
        - "dbt models"
        - "data warehouse"
        - "segment.io"
        - "mParticle"
        - "lifecycle email"
        - "customer data platform"

    - name: "PLG Companies with MAP-Product Event Gap"
      description: >
        B2B SaaS teams (30–300 employees, Series A–C) running a product-led growth motion
        with Mixpanel, Amplitude, or PostHog for product analytics — and trying to trigger
        lifecycle campaigns from product events via Marketo or HubSpot. The gap: legacy MAPs
        can't natively consume product events without a reverse ETL hop. These teams are either
        building custom integrations or tolerating 24–48h latency between event and campaign.
        The tell is: Mixpanel/Amplitude in their stack AND a MAP AND a reverse ETL tool.
        All confirmed Conversion customers (PDL, HockeyStack, Clay, Warmly) show this pattern.
      signals:
        - "Mixpanel"
        - "Amplitude"
        - "PostHog"
        - "product analytics"
        - "product-led growth"
        - "PLG"
        - "product events"
        - "behavioral email"
        - "activation campaign"
        - "feature adoption"

    - name: "CMO-Led Stack Replacement Initiative"
      description: >
        Series B+ B2B companies (100–1000 employees) where the MAP replacement decision
        has escalated to the CMO or VP Marketing — not just the MOPs team. The tell is
        executive-level LinkedIn content about "rebuilding marketing," a "Marketing Technology
        Director" hire (strategic ownership, not tactical execution), or a CMO posting about
        AI-native tooling. Neil Tewari's framing: "2026 is make or break for CMOs" — these
        execs are actively choosing between optimizing the legacy stack vs replacing it. When
        it reaches the CMO, budget is pre-approved and the sales cycle compresses.
      signals:
        - "rebuilding marketing"
        - "marketing transformation"
        - "marketing technology director"
        - "MAP replacement"
        - "AI-native marketing"
        - "legacy MAP"
        - "marketing stack replacement"
        - "CMO technology decision"

  maturity_stages:
    - EVALUATING    # Researching alternatives, no active project
    - SCOPING       # Running an internal project to replace the MAP
    - MIGRATING     # Active migration underway
    - OPTIMIZING    # Already migrated, expanding use cases

  target_titles:
    # Champions — feel the pain directly
    - "VP of Marketing Operations"
    - "Director of Marketing Operations"
    - "Marketing Operations Manager"
    - "Head of Marketing Operations"
    - "Demand Generation Engineer"
    - "Marketing Analytics Engineer"
    - "Marketing Data Engineer"
    - "Marketing Technology Manager"
    - "Martech Manager"
    # Approvers — own the budget
    - "VP of Marketing"
    - "CMO"
    - "Chief Marketing Officer"
    - "VP of Demand Generation"
    - "VP of Growth"
    # Influencers — own the warehouse
    - "Head of Data"
    - "VP of Data"
    - "Director of Data Engineering"
    - "Analytics Engineering Manager"

  disqualifiers:
    - "Fewer than 20 employees or pre-revenue"
    - "B2C — consumer product with no enterprise sales motion"
    - "Already contracted with a competing warehouse-native MAP"
    - "Marketing team of one (no ops function yet)"
    - "No data warehouse — running everything in the CRM alone"

scanners:
  github:
    enabled: true
    module: "scripts.scanners.github_scanner"
    lookback_days: 30
    topics:
      # MAP-integration topics: companies building on top of or around a legacy MAP
      - "marketing-automation"
      - "crm-integration"
      - "salesforce-integration"
      - "customer-data-platform"
      - "email-automation"
      # Reverse ETL / warehouse topics: companies bridging their warehouse to a MAP
      - "reverse-etl"
      - "hightouch"
      - "census"
    libraries:
      # Middleware libs: companies using these are papering over their MAP's limitations
      - "hightouch"
      - "census"
      - "snowflake-connector-python"
      - "google-cloud-bigquery"
    keywords:
      # Friction artifact keywords — actual integration code signals MAP pain
      - "marketo_client"
      - "marketo-api"
      - "hubspot-api"
      - "HubSpot REST API"
      - "marketo python"
      - "pardot python"
      - "marketo soap"
      # Replacement intent — companies explicitly evaluating or replacing their MAP
      - "Marketo alternative"
      - "HubSpot migration"
      - "MAP replacement"
      - "warehouse-native marketing"
      - "campaign orchestration warehouse"

  arxiv:
    enabled: false   # Not applicable for B2B SaaS martech buyers
    module: "scripts.scanners.arxiv_scanner"

  huggingface:
    enabled: false   # Not applicable for this vertical
    module: "scripts.scanners.hf_scanner"

  jobs:
    enabled: true
    module: "scripts.scanners.job_scanner"
    lookback_days: 30
    titles:
      - "marketing operations engineer"
      - "marketing operations manager"
      - "demand generation engineer"
      - "marketing analytics engineer"
      - "marketing data engineer"
      - "marketing technology manager"
      - "martech engineer"
      - "marketing automation manager"
      - "CRM marketing manager"
      - "lifecycle marketing manager"
      - "revenue operations engineer"
      # PLG motion titles — product event gap signal
      - "growth engineer"
      - "lifecycle growth manager"
      - "product marketing engineer"
      - "PLG engineer"
      # Emerging titles — "Marketing Engineer" is the new name for the MOPs expert role
      - "marketing engineer"
      - "lifecycle architect"
      - "revenue architecture manager"
      - "marketing attribution manager"
      - "marketing technology director"
    skills:
      # Legacy MAP skills = friction signal (they have it, we can replace it)
      - "Marketo"
      - "HubSpot"
      - "Pardot"
      - "Salesforce Marketing Cloud"
      - "Eloqua"
      # Warehouse skills = readiness signal (they can adopt warehouse-native)
      - "Snowflake"
      - "BigQuery"
      - "Databricks"
      - "dbt"
      - "SQL"
      # Middleware = pain signal (they're papering over their MAP's limitations)
      - "Hightouch"
      - "Census"
      - "Segment"
      - "mParticle"
      - "Fivetran"
      - "Airbyte"

  funding:
    enabled: true
    module: "scripts.scanners.funding_scanner"
    lookback_days: 30
    keywords:
      - "B2B SaaS"
      - "marketing technology"
      - "martech"
      - "revenue operations"
      - "sales automation"
      - "growth platform"
      - "customer engagement"
      - "lifecycle marketing"
      - "enterprise software"
      - "go-to-market"

  linkedin:
    enabled: true
    module: "scripts.scanners.linkedin_scanner"
    lookback_days: 3
    keywords:
      - "marketing operations"
      - "demand generation"
      - "marketing automation"
      - "MOPs"
      - "martech stack"
      - "HubSpot"
      - "Marketo"
      - "Pardot"
      - "campaign orchestration"
      - "lifecycle marketing"
      - "revenue operations"
      - "marketing data"
      - "warehouse-native"
      - "CDP"
      - "customer data platform"
      # Consolidation signals — companies actively auditing/shrinking their MarTech stack
      - "martech consolidation"
      - "tool rationalization"
      - "MAP evaluation"
      - "marketing stack audit"
      - "agent-native"
      - "marketing engineer"
      - "lifecycle architect"
      # Attribution/visibility signals — fragmented data across MAP + CRM + ads = pain
      - "multi-touch attribution"
      - "marketing attribution"
      - "full funnel visibility"

  g2:
    enabled: true
    module: "scripts.scanners.g2_authenticated_scanner"
    lookback_days: 30
    keywords:
      - "Marketo"
      - "HubSpot Enterprise"
      - "Pardot"
      - "MAP migration"
      - "marketing automation"

  g2_seeds:
    enabled: true
    module: "scripts.scanners.g2_seed_scanner"
    lookback_days: 30
    keywords:
      - "Marketo"
      - "HubSpot Enterprise"
      - "Pardot"

  funding_seeds:
    enabled: true
    module: "scripts.scanners.funding_seed_scanner"
    lookback_days: 30
    keywords:
      - "B2B SaaS"
      - "enterprise"

scoring:
  intent_weights:
    # Job posting is the strongest signal — MOPs hire means the pain is real and budgeted
    github_repo: 2.0
    arxiv_paper: 0.0    # Disabled
    huggingface_model: 0.0    # Disabled
    job_posting: 3.0
    funding_event: 2.5
    linkedin_activity: 2.0
    map_frustration: 2.5         # Public MAP frustration on LinkedIn/blog = active evaluation signal
    g2_review: 3.5               # Authenticated G2 review — named company + named vendor = highest signal

  half_lives_days:
    github_repo: 14.0    # Longer half-life — data infra repos stay relevant
    arxiv_paper: 10.0
    huggingface_model: 7.0
    job_posting: 14.0    # MOPs job open for 2 weeks = active project
    funding_event: 30.0  # Funding buys a longer window than RL signals
    linkedin_activity: 3.0
    map_frustration: 21.0        # LinkedIn posts stay relevant for ~3 weeks
    g2_review: 21.0              # G2 reviews don't expire quickly — reviewer frustration is durable

  icp_weight: 0.45      # ICP fit slightly higher weight than RL vertical
  intent_weight: 0.55   # Intent still dominant — a perfect-fit company with no MOPs hire is not ready

  grade_thresholds:
    A: 6.0    # Marketo+Salesforce ICP fit (10×0.45=4.5) + strong signal (9×0.55=4.95) = 9.45 → A
    B: 3.5    # Single MODERATE signal + partial ICP fit reliably reaches B
    C: 1.5    # Any real signal clears C; below is noise

filters:
  # Companies excluded from scoring — not realistic mid-market outbound targets.
  # The ICP is 50–500 employees, Series A–C. These are enterprise/large-cap or
  # wrong-vertical companies that show up because they hire MOPs people.
  company_blocklist:
    - "Anthropic"
    - "Databricks"
    - "Chime"
    - "Dave"
    - "ZOE"
    - "Bolt.new"
    - "Goodfire"
    - "Cognition"
    - "Fiddler AI"
    - "D2L"
    - "dnb"
    - "wheelhousedmg"
